<!DOCTYPE html>
<html>
<head>
    <title>My Applications</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f9; margin: 0; padding: 0; }
        h2 { text-align: center; margin-top: 20px; color: #333; }
        table { width: 80%; margin: 30px auto; border-collapse: collapse; background: white; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        th, td { padding: 12px; text-align: center; border: 1px solid #ddd; }
        th { background: #007bff; color: white; }
        tr:nth-child(even) { background: #f2f2f2; }
        tr:hover { background: #e6f2ff; }
        .badge { padding: 4px 10px; border-radius: 12px; color: white; font-size: 12px; }
        .applied { background: #007bff; }
        .shortlisted { background: #ffc107; color: #333; }
        .rejected { background: #dc3545; }
        .offered { background: #17a2b8; }
        .hired { background: #28a745; }
        .alert { width: 80%; margin: 30px auto; background: #d1ecf1; padding: 12px; border-radius: 6px; color: #0c5460; text-align: center; }
    </style>
</head>
<body>
<h2>My Applications</h2>

{% if applications %}
<table>
    <tr>
        <th>Job Title</th>
        <th>Company</th>
        <th>Applied At</th>
        <th>Status</th>
    </tr>
    {% for app in applications %}
    <tr>
        <td>{{ app.job.title }}</td>
        <td>{{ app.job.recruiter.company_name }}</td>
        <td>{{ app.applied_at|date:"d M Y" }}</td>
        <td>
            <span class="badge {{ app.status }}">{{ app.status|upper }}</span>
        </td>
    </tr>
    {% endfor %}
</table>
{% else %}
    <div class="alert">You have not applied to any jobs yet.</div>
{% endif %}
</body>
</html>
