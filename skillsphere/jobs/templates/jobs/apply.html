<!DOCTYPE html>
<html>
<head>
    <title>Apply - {{ job.title }}</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f9; margin: 0; padding: 0; }
        .container { width: 60%; margin: 40px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h4 { color: #333; margin-bottom: 5px; }
        p { color: #888; margin-top: 0; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 14px; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; display: inline-block; margin-right: 8px; margin-top: 15px; }
        .btn-primary { background: #007bff; color: white; }
        .btn-primary:hover { background: #0056b3; }
        .btn-secondary { background: #6c757d; color: white; }
        .btn-secondary:hover { background: #545b62; }
    </style>
</head>
<body>
<div class="container">
    <h4>Apply for: {{ job.title }}</h4>
    <p>{{ job.recruiter.company_name }}</p>
    <form method="POST">
        {% csrf_token %}
        <label>Cover Letter</label>
        {{ form.cover_letter }}
        <br>
        <button type="submit" class="btn btn-primary">Submit Application</button>
        <a href="{% url 'job_detail' job.pk %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body>
</html>
