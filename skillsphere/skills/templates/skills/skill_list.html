<!DOCTYPE html>
<html>
<head>
    <title>All Skills</title>
    <style>
        body { font-family: Arial; background:#f4f6f8; margin:0; }
        .container { width:80%; margin:auto; padding:20px; }
        h2 { text-align:center; }

        .card {
            background:white;
            padding:15px;
            margin:10px 0;
            border-radius:8px;
            box-shadow:0 2px 6px rgba(0,0,0,0.1);
        }

        .btn {
            display:inline-block;
            padding:8px 12px;
            background:#4CAF50;
            color:white;
            text-decoration:none;
            border-radius:5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>All Skills</h2>

    <a class="btn" href="{% url 'add_skill' %}">+ Add Skill</a>

    {% for skill in skills %}
        <div class="card">
            <h3>{{ skill.skill_name }}</h3>
            <p><b>Category:</b> {{ skill.category }}</p>
            <p>{{ skill.description }}</p>
        </div>
    {% endfor %}
</div>

</body>
</html>
