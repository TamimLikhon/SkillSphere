<!DOCTYPE html>
<html>
<head>
    <title>My Skills</title>
    <style>
        body { font-family: Arial; background:#eef2f3; }
        .container { width:75%; margin:auto; padding:20px; }

        .box {
            background:white;
            margin:10px 0;
            padding:15px;
            border-left:5px solid #2196F3;
            border-radius:6px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>My Skills</h2>

    {% for s in data %}
        <div class="box">
            <h3>{{ s.skill.skill_name }}</h3>
            <p>Level: {{ s.proficiency_level }}</p>
            <p>Experience: {{ s.years_of_experience }} years</p>
        </div>
    {% empty %}
        <p>No skills added yet.</p>
    {% endfor %}
</div>

</body>
</html>
